<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduClaw - 教师门户</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #edf2f7; min-height: 100vh; color: #1f2937; }
  header {
    background: linear-gradient(135deg, #0f766e 0%, #2563eb 100%);
    color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 30px rgba(15,23,42,0.14);
  }
  .logo { font-size: 1.8rem; }
  header h1 { font-size: 1.3rem; }
  .subtitle { font-size: 0.84rem; opacity: 0.86; }
  nav { margin-left: auto; display: flex; gap: 10px; }
  nav a {
    color: white; text-decoration: none; padding: 7px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.14); font-size: 0.84rem;
  }
  .container { max-width: 1260px; margin: 0 auto; padding: 22px 20px 28px; }
  .setup-banner {
    display: none; margin-bottom: 18px; padding: 14px 16px; border-radius: 16px;
    background: linear-gradient(135deg, #fff7ed, #fffbeb); border: 1px solid #fed7aa;
    color: #9a3412; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }
  .setup-banner.show { display: flex; }
  .setup-link {
    text-decoration: none; background: #ea580c; color: white; border-radius: 999px;
    padding: 8px 14px; font-size: 0.84rem; font-weight: 700;
  }
  .teacher-selector {
    display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;
    background: white; border-radius: 16px; padding: 16px; box-shadow: 0 6px 20px rgba(15,23,42,0.05);
  }
  .teacher-selector select, .teacher-selector input {
    padding: 9px 14px; border: 1px solid #dbe4f0; border-radius: 10px; font-size: 0.9rem; outline: none;
  }
  .teacher-selector select:focus, .teacher-selector input:focus { border-color: #2563eb; }
  .btn {
    padding: 9px 16px; border-radius: 10px; cursor: pointer; font-size: 0.88rem; border: none; font-weight: 700;
  }
  .btn-primary { background: linear-gradient(135deg, #0f766e, #2563eb); color: white; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 18px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  .card {
    background: white; border-radius: 18px; padding: 18px;
    box-shadow: 0 10px 28px rgba(15,23,42,0.06);
  }
  .card h3 { font-size: 1rem; margin-bottom: 14px; color: #0f172a; }
  .stat-card { text-align: center; }
  .stat-num { font-size: 2rem; font-weight: 800; color: #2563eb; }
  .stat-label { font-size: 0.82rem; color: #64748b; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 12px; text-align: left; font-size: 0.8rem; color: #64748b; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
  td { padding: 10px 12px; font-size: 0.88rem; border-bottom: 1px solid #f1f5f9; }
  .badge {
    display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 700;
  }
  .badge-high { background: #dcfce7; color: #166534; }
  .badge-mid  { background: #ffedd5; color: #9a3412; }
  .badge-low  { background: #fee2e2; color: #991b1b; }
  .kp-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid #f1f5f9; }
  .kp-row:last-child { border-bottom: none; }
  .kp-subject {
    font-size: 0.74rem; background: #dbeafe; color: #1d4ed8; padding: 2px 8px; border-radius: 999px; margin-right: 6px;
  }
  .kp-name-text { font-size: 0.88rem; }
  .kp-bar { width: 110px; height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
  .kp-fill { height: 100%; border-radius: 999px; }
  .chat-shell { display: flex; flex-direction: column; gap: 12px; }
  .chat-box {
    min-height: 360px; max-height: 62vh; overflow-y: auto; padding: 14px;
    border: 1px solid #dbe4f0; border-radius: 14px; background: #f8fafc;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { max-width: 84%; display: flex; flex-direction: column; gap: 6px; }
  .msg.user { align-self: flex-end; }
  .msg.ai { align-self: flex-start; }
  .msg-bubble {
    padding: 11px 14px; border-radius: 14px; line-height: 1.6; font-size: 0.92rem;
    box-shadow: 0 2px 8px rgba(15,23,42,0.05);
  }
  .msg.user .msg-bubble { background: linear-gradient(135deg, #2563eb, #0f766e); color: white; border-bottom-right-radius: 4px; }
  .msg.ai .msg-bubble { background: white; color: #1f2937; border-bottom-left-radius: 4px; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-row textarea {
    flex: 1; min-height: 46px; max-height: 120px; resize: none; padding: 11px 14px;
    border: 1px solid #dbe4f0; border-radius: 12px; outline: none; font: inherit;
  }
  .input-row textarea:focus { border-color: #2563eb; }
  .btn-send {
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, #0f766e, #2563eb); color: white; font-size: 1.1rem;
  }
  .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }
  .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-7px); } }
  .thinking-wrap { align-self: flex-start; max-width: 84%; }
  .thinking-toggle {
    display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px;
    background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; cursor: pointer; font-size: 0.78rem;
  }
  .thinking-toggle .arrow { transition: transform 0.2s ease; display: inline-block; }
  .thinking-toggle.open .arrow { transform: rotate(90deg); }
  .thinking-body {
    display: none; margin-top: 5px; padding: 8px 10px; border-radius: 10px;
    border: 1px solid #dbeafe; background: #f8fbff; color: #1e3a8a; font-size: 0.78rem; line-height: 1.6;
  }
  .thinking-body.open { display: block; }
  .tool-line { display: flex; gap: 6px; padding: 2px 0; }
  .tool-name { font-weight: 700; }
  .tl-summary { color: #64748b; font-size: 0.75rem; }
  .streaming-cursor::after { content: '▋'; animation: blink 1s step-end infinite; color: #2563eb; }
  @keyframes blink { 50% { opacity: 0; } }
  .rendered-card {
    width: 100%; max-width: min(1120px, calc(100vw - 140px)); border-radius: 14px; overflow: hidden;
    background: white; border: 1px solid #dbe4f0; box-shadow: 0 10px 25px rgba(15,23,42,0.08);
  }
  .rendered-header {
    padding: 11px 14px; color: white; background: linear-gradient(135deg, #0f766e, #2563eb);
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .rendered-open-btn, .rendered-close-btn {
    border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.16); color: white;
    border-radius: 999px; padding: 6px 11px; cursor: pointer; font-size: 0.78rem;
  }
  .rendered-iframe { width: 100%; min-height: 620px; border: none; background: white; }
  .rendered-modal {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    padding: 18px; background: rgba(15,23,42,0.72); z-index: 9999;
  }
  .rendered-modal.open { display: flex; }
  .rendered-modal-card {
    width: min(1420px, 96vw); height: min(92vh, 980px); border-radius: 18px; overflow: hidden; background: white;
    box-shadow: 0 24px 80px rgba(0,0,0,0.35); display: flex; flex-direction: column;
  }
  .rendered-modal-header {
    padding: 12px 16px; color: white; background: linear-gradient(135deg, #0f766e, #2563eb);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .rendered-modal-iframe { flex: 1; width: 100%; border: none; }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 0.5em 0 0.3em; }
  .msg-bubble p { margin: 0.35em 0; }
  .msg-bubble ul, .msg-bubble ol { margin: 0.35em 0; padding-left: 1.3em; }
  .msg-bubble pre { background: #f1f5f9; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 0.4em 0; }
  .msg-bubble code { background: #f1f5f9; padding: 0 4px; border-radius: 4px; }
  @media (max-width: 960px) {
    .grid-4, .grid-2 { grid-template-columns: 1fr; }
    .teacher-selector { flex-direction: column; align-items: stretch; }
    .msg, .thinking-wrap { max-width: 100%; }
    .rendered-card { max-width: 100%; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">👩‍🏫</div>
  <div>
    <h1>EduClaw 教师门户</h1>
    <div class="subtitle">班级学情分析与备课助手</div>
  </div>
  <nav>
    <a href="/setup">启动引导</a>
    <a href="/student">学生端</a>
    <a href="/parent">家长端</a>
  </nav>
</header>

<div class="container">
  <div class="setup-banner" id="setupBanner">
    <div id="setupBannerText">系统还没完成启动引导。</div>
    <a class="setup-link" href="/setup">去完成引导</a>
  </div>

  <div class="teacher-selector">
    <label style="font-size:0.9rem;color:#475569">教师账号：</label>
    <select id="teacherSelect">
      <option value="">-- 请选择 --</option>
    </select>
    <button class="btn btn-primary" onclick="loadClassReport()">加载学情</button>
    <input type="text" id="newTeacherName" placeholder="新教师姓名">
    <input type="text" id="newSubject" placeholder="所教科目（如：数学）">
    <button class="btn btn-primary" onclick="createTeacher()">+ 注册</button>
  </div>

  <div class="grid-4" id="statsRow" style="display:none">
    <div class="card stat-card"><div class="stat-num" id="s-students">0</div><div class="stat-label">班级学生数</div></div>
    <div class="card stat-card"><div class="stat-num" id="s-kp">0</div><div class="stat-label">覆盖知识点</div></div>
    <div class="card stat-card"><div class="stat-num" id="s-avg">0%</div><div class="stat-label">班级平均掌握度</div></div>
    <div class="card stat-card"><div class="stat-num" id="s-weak">0</div><div class="stat-label">薄弱知识点</div></div>
  </div>

  <div class="grid-2" id="reportGrid" style="display:none">
    <div class="card">
      <h3>📋 学生列表</h3>
      <table>
        <thead><tr><th>姓名</th><th>平均掌握度</th><th>状态</th></tr></thead>
        <tbody id="studentTable"></tbody>
      </table>
    </div>
    <div class="card">
      <h3>⚠️ 班级薄弱知识点</h3>
      <div id="weakKPList"></div>
    </div>
  </div>

  <div class="card" id="chatCard" style="display:none">
    <h3>📚 备课助手</h3>
    <div class="chat-shell">
      <div class="chat-box" id="chatBox">
        <div class="msg ai"><div class="msg-bubble">您好，我是 EduClaw 备课助手。我可以结合班级薄弱点生成教案、测验和互动内容。今天准备哪一节课？</div></div>
      </div>
      <div class="input-row">
        <textarea id="chatInput" placeholder="例如：围绕分数加减法准备一节含小游戏的课堂活动..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>
</div>

<div class="rendered-modal" id="renderedModal" onclick="closeRenderedModal(event)">
  <div class="rendered-modal-card">
    <div class="rendered-modal-header">
      <div id="renderedModalTitle">内容预览</div>
      <button class="rendered-close-btn" onclick="closeRenderedModal()">关闭</button>
    </div>
    <iframe class="rendered-modal-iframe" id="renderedModalFrame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let currentTeacherID = '';
let currentSessionID = '';
let eventSource = null;
let isStreaming = false;
let currentAIBubble = null;
let currentAIMsg = null;
let currentThinkingWrap = null;
let currentThinkingBody = null;
let currentRenderURLs = [];
let streamBuffer = '';

window.addEventListener('load', async () => {
  await checkSetupStatus();
  await loadTeachers();
});

async function checkSetupStatus() {
  try {
    const res = await fetch('/api/setup/status');
    const data = await res.json();
    if (!data.needs_setup) return;
    const banner = document.getElementById('setupBanner');
    document.getElementById('setupBannerText').textContent = `当前模型：${data.provider || '未设置'} / ${data.model || '未设置'}。建议先完成启动引导，再开始教师端使用。`;
    banner.classList.add('show');
  } catch (err) {
    console.error(err);
  }
}

async function loadTeachers() {
  const res = await fetch('/api/actors/teacher');
  const data = await res.json();
  const sel = document.getElementById('teacherSelect');
  (data.actors || []).forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.id;
    opt.textContent = a.name + (a.subject ? ' (' + a.subject + ')' : '');
    sel.appendChild(opt);
  });
}

async function createTeacher() {
  const name = document.getElementById('newTeacherName').value.trim();
  const subject = document.getElementById('newSubject').value.trim();
  if (!name) { alert('请输入教师姓名'); return; }
  const res = await fetch('/api/onboard', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ actor_type: 'teacher', name, subject })
  });
  const data = await res.json();
  if (!res.ok) {
    alert(data.error || '注册失败');
    return;
  }
  const opt = document.createElement('option');
  opt.value = data.id;
  opt.textContent = data.name + (subject ? ` (${subject})` : '');
  const select = document.getElementById('teacherSelect');
  select.appendChild(opt);
  select.value = data.id;
  document.getElementById('newTeacherName').value = '';
  document.getElementById('newSubject').value = '';
  loadClassReport();
}

async function loadClassReport() {
  const sel = document.getElementById('teacherSelect');
  if (!sel.value) { alert('请先选择教师账号'); return; }
  currentTeacherID = sel.value;

  const res = await fetch(`/api/teacher/${currentTeacherID}/class-report`);
  const data = await res.json();

  document.getElementById('statsRow').style.display = '';
  document.getElementById('reportGrid').style.display = '';
  document.getElementById('chatCard').style.display = '';

  const students = data.students || [];
  document.getElementById('s-students').textContent = students.length;

  let totalKP = 0;
  let totalMastery = 0;
  const classStats = data.class_stats || {};
  Object.values(classStats).forEach(kps => {
    kps.forEach(kp => {
      totalKP++;
      totalMastery += kp.class_mastery;
    });
  });
  const avgMastery = totalKP ? Math.round(totalMastery / totalKP) : 0;
  document.getElementById('s-kp').textContent = totalKP;
  document.getElementById('s-avg').textContent = avgMastery + '%';

  let weakCount = 0;
  const weakList = document.getElementById('weakKPList');
  weakList.innerHTML = '';
  Object.entries(classStats).forEach(([subject, kps]) => {
    kps.sort((a, b) => a.class_mastery - b.class_mastery).forEach(kp => {
      if (kp.class_mastery < 60) {
        weakCount++;
        const m = kp.class_mastery;
        const color = m >= 40 ? '#f97316' : '#ef4444';
        const div = document.createElement('div');
        div.className = 'kp-row';
        div.innerHTML = `<div><span class="kp-subject">${escapeHtml(subject)}</span><span class="kp-name-text">${escapeHtml(kp.kp_name)}</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="kp-bar"><div class="kp-fill" style="width:${m}%;background:${color}"></div></div>
            <span style="font-size:0.8rem;color:#64748b">${m}%</span>
          </div>`;
        weakList.appendChild(div);
      }
    });
  });
  if (!weakCount) {
    weakList.innerHTML = '<p style="color:#15803d;font-size:0.9rem;padding:8px 0">班级整体掌握情况良好。</p>';
  }
  document.getElementById('s-weak').textContent = weakCount;

  const tbody = document.getElementById('studentTable');
  tbody.innerHTML = '';
  students.forEach(s => {
    const m = s.avg_mastery;
    const badgeClass = m >= 70 ? 'badge-high' : m >= 40 ? 'badge-mid' : 'badge-low';
    const label = m >= 70 ? '良好' : m >= 40 ? '一般' : '待加强';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escapeHtml(s.name)}</td><td>${m}%</td><td><span class="badge ${badgeClass}">${label}</span></td>`;
    tbody.appendChild(tr);
  });
  if (!students.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#94a3b8;padding:20px">暂无学生数据</td></tr>';
  }
}

function addUserMessage(content) {
  const chatBox = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addAIMessage(content) {
  const chatBox = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div.querySelector('.msg-bubble');
}

function addTypingIndicator() {
  const chatBox = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'teacherTyping';
  div.innerHTML = `<div class="msg-bubble"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTypingIndicator() {
  document.getElementById('teacherTyping')?.remove();
}

function startAIBubble() {
  removeTypingIndicator();
  const chatBox = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-bubble" id="teacherStreamBubble"></div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  currentAIMsg = div;
  return div.querySelector('.msg-bubble');
}

function prepareAITurn() {
  if (currentAIBubble) return;
  currentAIBubble = startAIBubble();
  currentAIBubble.style.display = 'none';
}

function showCurrentAIBubble() {
  if (!currentAIBubble) prepareAITurn();
  currentAIBubble.style.display = '';
}

function insertAfterCurrentTurn(el) {
  const chatBox = document.getElementById('chatBox');
  const anchor = currentThinkingWrap || currentAIMsg;
  if (anchor && anchor.parentNode === chatBox) {
    chatBox.insertBefore(el, anchor.nextSibling);
  } else {
    chatBox.appendChild(el);
  }
  chatBox.scrollTop = chatBox.scrollHeight;
}

function buildRenderedURL(html) {
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  currentRenderURLs.push(url);
  return url;
}

function openRenderedModal(title, url) {
  document.getElementById('renderedModalTitle').textContent = title || '内容预览';
  document.getElementById('renderedModalFrame').src = url;
  document.getElementById('renderedModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeRenderedModal(event) {
  if (event && event.target && event.target.id !== 'renderedModal') return;
  document.getElementById('renderedModalFrame').src = 'about:blank';
  document.getElementById('renderedModal').classList.remove('open');
  document.body.style.overflow = '';
}

function ensureThinkingPanel() {
  if (currentThinkingWrap) return;
  prepareAITurn();

  const wrap = document.createElement('div');
  wrap.className = 'thinking-wrap';

  const toggle = document.createElement('div');
  toggle.className = 'thinking-toggle open';
  toggle.innerHTML = `<span class="arrow">▶</span> 思考过程 <span class="tl-count">0</span> 步`;

  const body = document.createElement('div');
  body.className = 'thinking-body open';

  toggle.onclick = () => {
    const open = body.classList.toggle('open');
    toggle.classList.toggle('open', open);
  };

  wrap.appendChild(toggle);
  wrap.appendChild(body);
  insertAfterCurrentTurn(wrap);

  currentThinkingWrap = wrap;
  currentThinkingBody = body;
}

function addToolEvent(ev) {
  ensureThinkingPanel();
  const line = document.createElement('div');
  line.className = 'tool-line';
  const toolLabels = {
    read_workspace_file: ['📂', '读取文件'],
    write_workspace_file: ['✏️', '写入文件'],
    add_daily_note: ['📝', '记录日志'],
    record_answer: ['📊', '记录答题'],
    query_knowledge: ['🔍', '查询知识'],
    render_content: ['🎨', '渲染内容'],
    read_skill: ['⚡', '加载技能']
  };
  const pair = toolLabels[ev.tool] || ['🔧', ev.tool];
  if (ev.phase === 'call') {
    line.innerHTML = `<span>${pair[0]}</span><span><span class="tool-name">${escapeHtml(pair[1])}</span>${ev.summary ? ` <span class="tl-summary">（${escapeHtml(ev.summary)}）</span>` : ''}</span>`;
  } else {
    line.innerHTML = `<span>↳</span><span>${escapeHtml(ev.summary || '完成')}</span>`;
  }
  currentThinkingBody.appendChild(line);
  currentThinkingWrap.querySelector('.tl-count').textContent = currentThinkingBody.querySelectorAll('.tool-name').length;
}

function addRenderedContent(rendered) {
  prepareAITurn();
  const div = document.createElement('div');
  div.className = 'msg ai';
  const iconMap = { game:'🎮', quiz:'📝', visual:'📊', embed:'🔗', video:'📹', report:'📋' };
  const icon = iconMap[rendered.type] || '📄';
  div.innerHTML = `<div class="rendered-card">
    <div class="rendered-header">
      <div>${icon} ${escapeHtml(rendered.title)}</div>
      <button class="rendered-open-btn" type="button">全屏查看</button>
    </div>
    <iframe class="rendered-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>`;
  insertAfterCurrentTurn(div);
  const iframe = div.querySelector('iframe');
  const url = buildRenderedURL(rendered.content);
  div.querySelector('.rendered-open-btn').addEventListener('click', () => openRenderedModal(rendered.title, url));
  iframe.addEventListener('load', () => {
    try {
      const h = iframe.contentDocument.body.scrollHeight;
      if (h > 200) iframe.style.minHeight = Math.min(h + 40, 780) + 'px';
    } catch (err) {}
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
  });
  iframe.src = url;
}

async function sendChat() {
  if (!currentTeacherID || isStreaming) { return; }
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content) return;

  input.value = '';
  autoResize(input);
  addUserMessage(content);
  addTypingIndicator();
  document.getElementById('sendBtn').disabled = true;
  isStreaming = true;

  const sessionID = crypto.randomUUID();
  currentSessionID = sessionID;
  currentAIBubble = null;
  currentAIMsg = null;
  currentThinkingWrap = null;
  currentThinkingBody = null;
  streamBuffer = '';

  function finishStreaming() {
    if (currentAIBubble) {
      currentAIBubble.classList.remove('streaming-cursor');
      if (!streamBuffer) {
        currentAIMsg?.remove();
      } else if (typeof marked !== 'undefined') {
        currentAIBubble.innerHTML = marked.parse(streamBuffer);
      }
    }
    if (currentThinkingBody) {
      currentThinkingBody.classList.remove('open');
      currentThinkingWrap.querySelector('.thinking-toggle').classList.remove('open');
    }
    eventSource?.close();
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
  }

  eventSource = new EventSource(`/api/chat/stream/${sessionID}`);

  eventSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'tool_call') {
      removeTypingIndicator();
      try { addToolEvent(JSON.parse(msg.content)); } catch (err) { console.error(err); }
    } else if (msg.type === 'text') {
      removeTypingIndicator();
      prepareAITurn();
      showCurrentAIBubble();
      currentAIBubble.classList.add('streaming-cursor');
      streamBuffer += msg.content;
      currentAIBubble.textContent = streamBuffer;
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    } else if (msg.type === 'rendered') {
      removeTypingIndicator();
      try { addRenderedContent(JSON.parse(msg.content)); } catch (err) { console.error(err); }
      setTimeout(loadClassReport, 600);
    } else if (msg.type === 'error') {
      removeTypingIndicator();
      addAIMessage('抱歉，处理请求时出错：' + (msg.content || '未知错误'));
      finishStreaming();
    } else if (msg.type === 'done' || msg.done) {
      removeTypingIndicator();
      finishStreaming();
    }
  };

  eventSource.onerror = () => {
    if (!isStreaming) return;
    removeTypingIndicator();
    if (!currentAIBubble) {
      addAIMessage('连接中断，请检查网络后重试。');
    }
    finishStreaming();
  };

  let postSent = false;
  eventSource.onopen = async () => {
    if (postSent) return;
    postSent = true;
    try {
      await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          actor_id: currentTeacherID,
          actor_type: 'teacher',
          session_id: sessionID,
          content
        })
      });
    } catch (err) {
      removeTypingIndicator();
      addAIMessage('连接错误，请检查服务器是否运行中。');
      finishStreaming();
    }
  };
}

function handleKey(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendChat();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(text || ''));
  return div.innerHTML;
}
</script>
</body>
</html>
